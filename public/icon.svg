    <ellipse cx="256" cy="262" rx="150" ry="66" transform="rotate(34 256 262)"/>
    <ellipse cx="256" cy="262" rx="150" ry="66" transform="rotate(-34 256 262)"/>
    <ellipse cx="256" cy="262" rx="66" ry="150" transform="rotate(18 256 262)"/>
